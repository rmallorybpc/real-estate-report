<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Report</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
        }
        .nav-brand {
            font-weight: 700;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            color: #2c3e50;
            font-size: 0.95em;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-link {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
        }
        .nav-link:hover {
            background-color: #ecf0f1;
        }
        .nav-button {
            background: linear-gradient(135deg, #1f4d73, #2c3e50);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            box-shadow: 0 10px 18px rgba(31, 77, 115, 0.25);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .nav-button:hover {
            background: linear-gradient(135deg, #1a3f5e, #243445);
            box-shadow: 0 12px 22px rgba(31, 77, 115, 0.32);
            transform: translateY(-1px);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            border-bottom: 3px solid #2c3e50;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #2c3e50;
            margin: 0;
            font-size: 2.2em;
        }
        .header .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-top: 10px;
        }
        .loading,
        .error-state {
            background-color: #ecf0f1;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .error-state {
            border-left: 5px solid #e74c3c;
            background-color: #fdecea;
            color: #7f1d1d;
        }
        .priority-section {
            margin-bottom: 40px;
        }
        .priority-high {
            border-left: 5px solid #e74c3c;
        }
        .priority-medium {
            border-left: 5px solid #f39c12;
        }
        .priority-low {
            border-left: 5px solid #95a5a6;
        }
        .priority-section h2 {
            color: #2c3e50;
            margin-top: 0;
            padding-left: 15px;
        }
        .opportunity {
            background-color: #f8f9fa;
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .opportunity h3 {
            color: #2c3e50;
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .score {
            background-color: #3498db;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .score.high { background-color: #e74c3c; }
        .score.medium { background-color: #f39c12; }
        .score.low { background-color: #95a5a6; }
        .category {
            display: inline-block;
            background-color: #ecf0f1;
            color: #2c3e50;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            margin-right: 10px;
            font-weight: 500;
        }
        .signal {
            font-weight: 600;
            color: #27ae60;
            margin: 10px 0;
        }
        .source {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 10px;
        }
        .source a {
            color: #3498db;
            text-decoration: none;
        }
        .source a:hover {
            text-decoration: underline;
        }
        .market-summary {
            background-color: #ecf0f1;
            padding: 25px;
            border-radius: 8px;
            margin: 30px 0;
        }
        .market-summary h2 {
            color: #2c3e50;
            margin-top: 0;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .metric {
            background-color: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        .metric-value {
            font-size: 1.4em;
            font-weight: bold;
            color: #2c3e50;
        }
        .metric-label {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 5px;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #bdc3c7;
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
            <div class="nav-brand">Real Estate Intelligence</div>
            <div class="nav-links">
                <a class="nav-link" href="index.html">Report</a>
                <a class="nav-button" href="dashboard.html">View Dashboard</a>
            </div>
        </div>
        <div class="header">
            <h1 id="report-title">Real Estate Report</h1>
            <div id="report-subtitle" class="subtitle">Loading latest report...</div>
        </div>
        <div id="app-content">
            <div class="loading">Loading report data from data.json...</div>
        </div>

        <div class="footer" id="report-footer">
            <p><strong>Real Estate Report</strong><br>
            <em>This report analyzes publicly available real estate data and news sources for investment intelligence purposes.</em></p>
        </div>
    </div>
    <script>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text == null ? '' : String(text);
            return div.innerHTML;
        }

        function formatDate(dateValue) {
            if (!dateValue) {
                return 'Unknown date';
            }

            const date = new Date(dateValue);
            if (Number.isNaN(date.getTime())) {
                return dateValue;
            }

            return date.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function titleCase(text) {
            return String(text || '')
                .replace(/_/g, ' ')
                .replace(/\b\w/g, (match) => match.toUpperCase());
        }

        function renderMetricCards(marketContext) {
            if (!marketContext || typeof marketContext !== 'object') {
                return '<p>No market context provided in this report.</p>';
            }

            const metrics = Object.entries(marketContext);
            if (metrics.length === 0) {
                return '<p>No market context provided in this report.</p>';
            }

            return `
                <div class="metrics-grid">
                    ${metrics.map(([key, value]) => `
                        <div class="metric">
                            <div class="metric-value">${escapeHtml(value)}</div>
                            <div class="metric-label">${escapeHtml(titleCase(key))}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderOpportunityCard(item, bucketStyle) {
            const address = item.address || 'Unspecified opportunity';
            const score = item.score != null ? item.score : 'N/A';
            const category = item.category || 'Uncategorized';
            const keySignal = item.key_signal || 'No key signal provided';
            const details = item.details || item.reasoning || 'No additional details provided.';
            const source = item.source || 'Unknown source';
            const link = item.link;

            const detailsFragments = [item.price, item.date_sold, item.date_available]
                .filter(Boolean)
                .map((value) => `<span>${escapeHtml(value)}</span>`);

            return `
                <div class="opportunity">
                    <h3>
                        ${escapeHtml(address)}
                        <span class="score ${bucketStyle}">Score: ${escapeHtml(score)}</span>
                    </h3>
                    <div class="category">${escapeHtml(category)}</div>
                    <div class="signal">Signal: ${escapeHtml(keySignal)}</div>
                    <p>${escapeHtml(details)}</p>
                    ${detailsFragments.length ? `<p>${detailsFragments.join(' | ')}</p>` : ''}
                    <div class="source">Source: ${escapeHtml(source)}${link ? ` | <a href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">View Listing</a>` : ''}</div>
                </div>
            `;
        }

        function renderPrioritySection(label, sectionClass, scoreLabel, items) {
            const cards = (items || []).map((item) => renderOpportunityCard(item, sectionClass)).join('');
            const body = cards || '<div class="opportunity"><p>No opportunities in this section.</p></div>';

            return `
                <div class="priority-section priority-${sectionClass}">
                    <h2>${label} (${scoreLabel})</h2>
                    ${body}
                </div>
            `;
        }

        function renderInsights(reportData) {
            const trends = reportData.market_insights && Array.isArray(reportData.market_insights.key_trends)
                ? reportData.market_insights.key_trends
                : [];

            if (trends.length > 0) {
                return `
                    <div class="market-summary">
                        <h2>Key Market Insights</h2>
                        <ul>
                            ${trends.map((trend) => `<li>${escapeHtml(trend)}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            const scoringModel = reportData.scoring_model && typeof reportData.scoring_model === 'object'
                ? Object.entries(reportData.scoring_model)
                : [];

            if (scoringModel.length > 0) {
                return `
                    <div class="market-summary">
                        <h2>Scoring Model</h2>
                        <ul>
                            ${scoringModel.map(([key, value]) => `<li><strong>${escapeHtml(titleCase(key))}:</strong> ${escapeHtml(value)}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }

            return '';
        }

        function updateHeader(reportMetadata) {
            const title = reportMetadata.report_title || 'Real Estate Report';
            const reportDate = formatDate(reportMetadata.report_date);
            const timeWindow = reportMetadata.time_window || 'Unknown window';
            const region = reportMetadata.region || 'Unknown region';

            document.title = `${title} - ${reportDate}`;
            document.getElementById('report-title').textContent = title;
            document.getElementById('report-subtitle').innerHTML = `Local Real Estate Intelligence: ${escapeHtml(region)}<br>Report Date: ${escapeHtml(reportDate)} | Analysis Period: ${escapeHtml(timeWindow)}`;
        }

        function updateFooter(reportMetadata) {
            const generatedAt = reportMetadata.generated_at ? formatDate(reportMetadata.generated_at) : 'Unknown';
            const sources = Array.isArray(reportMetadata.sources) ? reportMetadata.sources.join(', ') : 'N/A';

            document.getElementById('report-footer').innerHTML = `
                <p><strong>Real Estate Report</strong><br>
                Generated: ${escapeHtml(generatedAt)} | Sources: ${escapeHtml(sources)}<br>
                <em>This report analyzes publicly available real estate data and news sources for investment intelligence purposes.</em></p>
            `;
        }

        async function loadReport() {
            const app = document.getElementById('app-content');

            try {
                const response = await fetch('data.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const reportData = await response.json();
                const reportMetadata = reportData.report_metadata || {};

                updateHeader(reportMetadata);
                updateFooter(reportMetadata);

                app.innerHTML = `
                    <div class="market-summary">
                        <h2>Market Overview</h2>
                        <p>This report is generated from the latest Zapier payload in <strong>data.json</strong>.</p>
                        ${renderMetricCards(reportMetadata.market_context)}
                    </div>
                    ${renderPrioritySection('HIGH PRIORITY OPPORTUNITIES', 'high', 'Score 8-10', reportData.high_priority_opportunities)}
                    ${renderPrioritySection('MEDIUM PRIORITY OPPORTUNITIES', 'medium', 'Score 5-7', reportData.medium_priority_opportunities)}
                    ${renderPrioritySection('LOW PRIORITY OPPORTUNITIES', 'low', 'Score 1-4', reportData.low_priority_opportunities)}
                    ${renderInsights(reportData)}
                `;
            } catch (error) {
                app.innerHTML = `
                    <div class="error-state">
                        <h2>Unable to load report data</h2>
                        <p>Update <strong>data.json</strong> with valid JSON and refresh this page.</p>
                        <p>Error detail: ${escapeHtml(error.message)}</p>
                    </div>
                `;
            }
        }

        loadReport();
    </script>
</body>
</html>
